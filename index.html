<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faltantes</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222;
    --border: #2e2e2e;
    --accent: #e8ff3c;
    --accent2: #3cffb4;
    --text: #f0f0f0;
    --muted: #666;
    --done-bg: #111;
    --done-text: #444;
    --red: #ff4444;
    --tag-bg: #252525;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    padding-bottom: 40px;
  }
  header {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent); }
  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .counter {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 4px;
  }
  .counter .num { color: var(--accent); font-weight: 600; }
  .tabs {
    display: flex;
    gap: 2px;
    padding: 0 20px;
    margin-top: 16px;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 8px 16px;
    font-size: 13px;
    font-family: 'IBM Plex Mono', monospace;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    margin-bottom: -1px;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .content { padding: 16px 20px; max-width: 900px; margin: 0 auto; }
  .add-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 16px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'IBM Plex Sans', sans-serif;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .add-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .add-btn:active { transform: translateY(0); }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    justify-content: center;
    align-items: flex-end;
    padding: 0;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    padding: 24px 20px 32px;
    width: 100%;
    max-width: 600px;
    animation: slideUp 0.25s ease;
    max-height: 90vh;
    overflow-y: auto;
  }
  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .modal-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 15px;
    font-weight: 600;
  }
  .modal-close {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 28px; height: 28px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.15s;
  }
  .modal-close:hover { color: var(--text); }
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  label {
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  input, textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 12px;
    border-radius: 6px;
    font-size: 14px;
    font-family: 'IBM Plex Sans', sans-serif;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  input:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 70px; }
  .form-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }
  .btn-primary {
    flex: 1;
    padding: 11px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    font-family: 'IBM Plex Sans', sans-serif;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-primary:hover { opacity: 0.85; }
  .btn-cancel {
    padding: 11px 20px;
    background: none;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
    font-family: 'IBM Plex Sans', sans-serif;
    cursor: pointer;
    transition: color 0.15s;
  }
  .btn-cancel:hover { color: var(--text); }

  /* LIST */
  .item-list { display: flex; flex-direction: column; gap: 8px; }
  .item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 14px;
    align-items: start;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }
  .item:hover { border-color: #3a3a3a; }
  .item.done {
    background: var(--done-bg);
    border-color: #1e1e1e;
    opacity: 0.6;
  }
  .check-btn {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
    transition: all 0.2s;
    color: transparent;
    font-size: 12px;
  }
  .check-btn:hover { border-color: var(--accent2); }
  .item.done .check-btn {
    border-color: var(--accent2);
    background: var(--accent2);
    color: #000;
  }
  .item-body { min-width: 0; }
  .item-art {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.3;
    margin-bottom: 6px;
  }
  .item.done .item-art { text-decoration: line-through; color: var(--done-text); }
  .item-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }
  .tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    background: var(--tag-bg);
    border: 1px solid var(--border);
    padding: 2px 7px;
    border-radius: 4px;
    color: var(--muted);
  }
  .tag.prov { color: #7eb8ff; border-color: #1e3a5f; background: #0d1e30; }
  .tag.code { color: var(--accent); border-color: #3a3e00; background: #1c1f00; }
  .tag.date { color: var(--accent2); border-color: #003a28; background: #001a12; }
  .item-comment {
    margin-top: 6px;
    font-size: 12px;
    color: var(--muted);
    font-style: italic;
  }
  .item-actions { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
  .del-btn {
    width: 28px; height: 28px;
    background: none;
    border: none;
    color: var(--border);
    cursor: pointer;
    font-size: 15px;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.15s, background 0.15s;
    flex-shrink: 0;
  }
  .del-btn:hover { color: var(--red); background: rgba(255,68,68,0.1); }
  .done-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--accent2);
    background: #001a12;
    border: 1px solid #003a28;
    padding: 2px 6px;
    border-radius: 4px;
    white-space: nowrap;
  }
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 13px;
  }
  .empty .icon { font-size: 36px; margin-bottom: 10px; }

  @media (max-width: 500px) {
    .form-grid { grid-template-columns: 1fr; }
    .form-group.full { grid-column: 1; }
    header { padding: 16px; }
    .content { padding: 12px 16px; }
    .item { padding: 12px; gap: 10px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo"><span>//</span> FALTANTES</div>
  <div class="header-right">
    <div class="counter" id="counter"><span class="num" id="pendCount">0</span> pendientes</div>
    <button class="add-btn" onclick="openModal()">+ Agregar</button>
  </div>
</header>

<div style="padding: 0 20px; max-width: 900px; margin: 0 auto;">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('pending', this)">Pendientes</button>
    <button class="tab" onclick="switchTab('done', this)">Finalizados</button>
    <button class="tab" onclick="switchTab('all', this)">Todos</button>
  </div>
</div>

<div class="content">
  <div class="item-list" id="itemList"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">// NUEVO ARTÍCULO</div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label>Fecha</label>
        <input type="date" id="fFecha">
      </div>
      <div class="form-group">
        <label>Código</label>
        <input type="text" id="fCodigo" placeholder="EJ: EH002-0096A">
      </div>
      <div class="form-group full">
        <label>Artículo</label>
        <input type="text" id="fArticulo" placeholder="Nombre del artículo">
      </div>
      <div class="form-group">
        <label>Proveedor</label>
        <input type="text" id="fProveedor" placeholder="Nombre del proveedor">
      </div>
      <div class="form-group full">
        <label>Comentario</label>
        <textarea id="fComentario" placeholder="Notas adicionales..."></textarea>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeModalDirect()">Cancelar</button>
      <button class="btn-primary" onclick="saveItem()">Guardar artículo</button>
    </div>
  </div>
</div>

<script>
const SEED = [
  { id: 1, fecha: '2026-03-01', codigo: 'EH002-0096A', articulo: 'TIRADOR ALUMINIO EH002-0096A - 096mm + 2 tor - T2', proveedor: 'Placasur', comentario: '', done: false, doneDate: null },
  { id: 2, fecha: '2026-04-01', codigo: 'EHM61213', articulo: 'MANGUITO METALICO M06 Diam 8 x 13mm', proveedor: 'Placasur', comentario: '', done: false, doneDate: null },
  { id: 3, fecha: '2026-04-01', codigo: 'EHCF226NI', articulo: 'CERRADURA CAJONERA 0600mm', proveedor: 'Placasur', comentario: '', done: false, doneDate: null },
  { id: 4, fecha: '2026-04-01', codigo: 'EHCE1924NI', articulo: 'CERRADURA EMPUJE-GABINETE', proveedor: 'Placasur', comentario: '', done: false, doneDate: null },
  { id: 5, fecha: '2026-04-01', codigo: 'EHM61011', articulo: 'TARUGO PLASTICO M6 10 x 11/13', proveedor: 'Placasur', comentario: '', done: false, doneDate: null },
  { id: 6, fecha: '2026-04-01', codigo: '', articulo: 'Baltico SPC 25mm', proveedor: 'DAC', comentario: '', done: false, doneDate: null },
  { id: 7, fecha: '2026-04-01', codigo: '', articulo: 'Roble Am. 25mm', proveedor: 'DAC', comentario: '', done: false, doneDate: null },
  { id: 8, fecha: '2026-04-01', codigo: 'BRZ-1162', articulo: 'CERRADURA DIGITAL - BRZ-1162', proveedor: 'bronzen', comentario: '', done: false, doneDate: null },
];

let items = [];
let nextId = 100;
let currentTab = 'pending';
let editId = null;

function load() {
  try {
    const s = localStorage.getItem('faltantes_v2');
    if (s) { const d = JSON.parse(s); items = d.items; nextId = d.nextId || 100; }
    else { items = JSON.parse(JSON.stringify(SEED)); save(); }
  } catch(e) { items = JSON.parse(JSON.stringify(SEED)); }
}
function save() {
  try { localStorage.setItem('faltantes_v2', JSON.stringify({ items, nextId })); } catch(e) {}
}
function fmtDate(d) {
  if (!d) return '';
  const [y,m,dd] = d.split('-');
  return `${dd}/${m}/${y}`;
}
function todayStr() {
  return new Date().toISOString().slice(0,10);
}
function render() {
  const list = document.getElementById('itemList');
  let data = items;
  if (currentTab === 'pending') data = items.filter(i => !i.done);
  if (currentTab === 'done') data = items.filter(i => i.done);
  document.getElementById('pendCount').textContent = items.filter(i=>!i.done).length;
  if (data.length === 0) {
    list.innerHTML = `<div class="empty"><div class="icon">${currentTab==='done'?'✅':'📋'}</div><div>${currentTab==='done'?'Sin artículos finalizados':'Sin artículos pendientes'}</div></div>`;
    return;
  }
  list.innerHTML = data.map(item => `
    <div class="item${item.done?' done':''}" id="item-${item.id}">
      <button class="check-btn" onclick="toggleDone(${item.id})" title="${item.done?'Marcar pendiente':'Marcar resuelto'}">
        ${item.done ? '✓' : ''}
      </button>
      <div class="item-body">
        <div class="item-art">${item.articulo || '—'}</div>
        <div class="item-meta">
          ${item.fecha ? `<span class="tag date">📅 ${fmtDate(item.fecha)}</span>` : ''}
          ${item.proveedor ? `<span class="tag prov">${item.proveedor}</span>` : ''}
          ${item.codigo ? `<span class="tag code">${item.codigo}</span>` : ''}
        </div>
        ${item.comentario ? `<div class="item-comment">💬 ${item.comentario}</div>` : ''}
      </div>
      <div class="item-actions">
        ${item.done ? `<div class="done-badge">✓ ${fmtDate(item.doneDate)}</div>` : ''}
        <button class="del-btn" onclick="editItem(${item.id})" title="Editar">✏️</button>
        <button class="del-btn" onclick="deleteItem(${item.id})" title="Eliminar">🗑</button>
      </div>
    </div>
  `).join('');
}
function toggleDone(id) {
  const item = items.find(i=>i.id===id);
  if (!item) return;
  item.done = !item.done;
  item.doneDate = item.done ? todayStr() : null;
  save(); render();
}
function deleteItem(id) {
  if (!confirm('¿Eliminar este artículo?')) return;
  items = items.filter(i=>i.id!==id);
  save(); render();
}
function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  render();
}
function openModal() {
  editId = null;
  document.getElementById('modalTitle').textContent = '// NUEVO ARTÍCULO';
  document.getElementById('fFecha').value = todayStr();
  document.getElementById('fCodigo').value = '';
  document.getElementById('fArticulo').value = '';
  document.getElementById('fProveedor').value = '';
  document.getElementById('fComentario').value = '';
  document.getElementById('modalOverlay').classList.add('show');
}
function editItem(id) {
  const item = items.find(i=>i.id===id);
  if (!item) return;
  editId = id;
  document.getElementById('modalTitle').textContent = '// EDITAR ARTÍCULO';
  document.getElementById('fFecha').value = item.fecha || '';
  document.getElementById('fCodigo').value = item.codigo || '';
  document.getElementById('fArticulo').value = item.articulo || '';
  document.getElementById('fProveedor').value = item.proveedor || '';
  document.getElementById('fComentario').value = item.comentario || '';
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('show');
}
function saveItem() {
  const articulo = document.getElementById('fArticulo').value.trim();
  if (!articulo) { document.getElementById('fArticulo').focus(); return; }
  const data = {
    fecha: document.getElementById('fFecha').value,
    codigo: document.getElementById('fCodigo').value.trim(),
    articulo,
    proveedor: document.getElementById('fProveedor').value.trim(),
    comentario: document.getElementById('fComentario').value.trim(),
  };
  if (editId) {
    const item = items.find(i=>i.id===editId);
    if (item) Object.assign(item, data);
  } else {
    items.push({ id: nextId++, ...data, done: false, doneDate: null });
  }
  save(); render(); closeModalDirect();
}

load(); render();
</script>
</body>
</html>
